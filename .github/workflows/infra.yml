name: Apply Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "worker/**"
      - ".github/workflows/infra.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-prod
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  RESEND_SECRET_NAME: resend-api-key

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Prepare worker zip
        run: |
          cd ../worker
          zip -r ../infra/worker.zip . -x 'email_templates/*'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Bootstrap Resend secret
        run: |
          terraform apply -auto-approve \
            -target=google_secret_manager_secret.resend_api_key \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="api_domain=${{ vars.API_DOMAIN }}" \
            -var="resend_secret_name=${{ env.RESEND_SECRET_NAME }}" \
            -var="delegaciones_spreadsheet_id=${{ vars.DELEGACIONES_SPREADSHEET_ID }}" \
            -var="delegaciones_sheet_id=${{ vars.DELEGACIONES_SHEET_ID }}" \
            -var="delegaciones_table_id=${{ vars.DELEGACIONES_TABLE_ID }}" \
            -var="faculty_spreadsheet_id=${{ vars.FACULTY_SPREADSHEET_ID }}" \
            -var="faculty_general_sheet_id=${{ vars.FACULTY_GENERAL_SHEET_ID }}" \
            -var="faculty_general_table_id=${{ vars.FACULTY_GENERAL_TABLE_ID }}" \
            -var="faculty_delegaciones_sheet_id=${{ vars.FACULTY_DELEGACIONES_SHEET_ID }}" \
            -var="faculty_delegaciones_table_id=${{ vars.FACULTY_DELEGACIONES_TABLE_ID }}"

      - name: Seed Resend API key secret version
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          test -n "$RESEND_API_KEY"
          printf '%s' "$RESEND_API_KEY" | gcloud secrets versions add "$RESEND_SECRET_NAME" --project="${{ vars.GCP_PROJECT_ID }}" --data-file=-

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="api_domain=${{ vars.API_DOMAIN }}" \
            -var="resend_secret_name=${{ env.RESEND_SECRET_NAME }}" \
            -var="delegaciones_spreadsheet_id=${{ vars.DELEGACIONES_SPREADSHEET_ID }}" \
            -var="delegaciones_sheet_id=${{ vars.DELEGACIONES_SHEET_ID }}" \
            -var="delegaciones_table_id=${{ vars.DELEGACIONES_TABLE_ID }}" \
            -var="faculty_spreadsheet_id=${{ vars.FACULTY_SPREADSHEET_ID }}" \
            -var="faculty_general_sheet_id=${{ vars.FACULTY_GENERAL_SHEET_ID }}" \
            -var="faculty_general_table_id=${{ vars.FACULTY_GENERAL_TABLE_ID }}" \
            -var="faculty_delegaciones_sheet_id=${{ vars.FACULTY_DELEGACIONES_SHEET_ID }}" \
            -var="faculty_delegaciones_table_id=${{ vars.FACULTY_DELEGACIONES_TABLE_ID }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
