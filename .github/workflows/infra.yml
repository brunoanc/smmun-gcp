name: Apply Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "worker/**"
      - ".github/workflows/infra.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-prod
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Prepare worker zip
        run: |
          cd ../worker
          zip -r ../infra/worker.zip . -x 'email_templates/*'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="api_domain=${{ vars.API_DOMAIN }}" \
            -var="delegaciones_spreadsheet_id=10V54CqKaXQFwFsFkw0eBpXSDH-MhZ1pXwKJYB1rJoC4" \
            -var="delegaciones_sheet_id=1743848330" \
            -var="delegaciones_table_id=1509385248" \
            -var="faculty_spreadsheet_id=118vacPNUVHQ2OmEWYsL9qSPxkdrvMTscn2kQRGlNDAE" \
            -var="faculty_general_sheet_id=0" \
            -var="faculty_general_table_id=2079575764" \
            -var="faculty_delegaciones_sheet_id=399805608" \
            -var="faculty_delegaciones_table_id=1297311155" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
